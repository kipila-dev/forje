[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "forje"
dynamic = ["version"]
description = "The build system for your design system"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Ondrej Kipila", email = "ondrej@kipila.dev" }]
dependencies = ["resforge", "coloraide", "starlark-pyo3", "typer"]

[tool.hatch.version]
path = "src/forje/__init__.py"

[project.scripts]
forje = "forje.cli.main:app"
