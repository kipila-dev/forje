[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "resforge"
dynamic = ["version"]
description = "A type-safe Python DSL for cross-platform mobile resource generation"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Kipila Ltd", email = "hello@kipila.dev" }]
keywords = [
  "dsl",
  "design-tokens",
  "android-xml",
  "xcassets",
  "code-generation",
  "white-label",
  "mobile-infra",
  "type-safety",
  "automation",
]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "License :: OSI Approved :: MIT License",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Build Tools",
]
dependencies = ["coloraide"]

[project.urls]
Homepage = "https://kipila.dev"
Repository = "https://github.com/kipila-dev/resforge"

[tool.hatch.version]
path = "src/resforge/__init__.py"

[tool.hatch.envs.default]
dependencies = ["basedpyright", "defusedxml", "pytest", "ruff"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D100", "D104", "D105", "ANN401", "PLR2004", "E741"]

[tool.ruff.lint.extend-per-file-ignores]
"tests/**/*.py" = [
  "ANN001",
  "ANN201",
  "D101",
  "D102",
  "D103",
  "EM101",
  "S101",
  "TRY301",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.basedpyright]
include = ["src"]
typeCheckingMode = "recommended"
pythonVersion = "3.12"
reportUnusedCallResult = "none"
