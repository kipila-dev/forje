[dependency-groups]
dev = ["basedpyright", "pytest", "ruff"]

[tool.uv]
managed = true

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D100", "D104", "D105", "D107", "E741", "ANN401", "PLR2004"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint.extend-per-file-ignores]
"packages/*/tests/**/*.py" = [
  "ANN001",
  "ANN201",
  "D101",
  "D102",
  "D103",
  "EM101",
  "S101",
  "TRY301",
]

[tool.basedpyright]
venvPath = "."
venv = ".venv"
include = ["packages"]
typeCheckingMode = "recommended"
pythonVersion = "3.12"
reportUnusedCallResult = "none"
